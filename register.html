<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Qevorix - User Registration</title>
    <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">


  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

  <section class="min-vh-100 d-flex align-items-center py-5">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-8">

          <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

            <div class="row g-0">

              <!-- Left Side -->
              <div class="col-lg-5 bg-dark text-white p-5 d-flex flex-column justify-content-center">

                <h2 class="fw-bold mb-3">
                  Join Qevorix
                </h2>

                <p class="mb-4">
                  Create your account to access regulatory registration,
                  compliance services, and application tracking.
                </p>

                <div class="mb-3 d-flex align-items-center">
                  <i class="bi bi-check-circle-fill me-2"></i>
                  <span>Fast Registration Process</span>
                </div>

                <div class="mb-3 d-flex align-items-center">
                  <i class="bi bi-shield-check me-2"></i>
                  <span>Secure Account Access</span>
                </div>

                <div class="d-flex align-items-center">
                  <i class="bi bi-file-earmark-check me-2"></i>
                  <span>Track Your Applications</span>
                </div>

              </div>

              <!-- Right Side -->
              <div class="col-lg-7 bg-white p-5">

                <div class="mb-4">

                  <h3 class="fw-bold">
                    Create Account
                  </h3>

                  <p class="text-muted mb-0">
                    Fill in your details to get started.
                  </p>

                </div>

                <form>

                  <div class="row">

                    <div class="col-md-6 mb-3">
                      <label class="form-label">First Name</label>

                      <input type="text"
                        class="form-control form-control-lg"
                        placeholder="John">
                    </div>

                    <div class="col-md-6 mb-3">
                      <label class="form-label">Last Name</label>

                      <input type="text"
                        class="form-control form-control-lg"
                        placeholder="Doe">
                    </div>

                  </div>

                  <div class="mb-3">
                    <label class="form-label">Business Name</label>

                    <input type="text"
                      class="form-control form-control-lg"
                      placeholder="Enter business name">
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Email Address</label>

                    <input type="email"
                      class="form-control form-control-lg"
                      placeholder="example@email.com">
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Phone Number</label>

                    <input type="tel"
                      class="form-control form-control-lg"
                      placeholder="+234 XXX XXX XXXX">
                  </div>

                  <div class="row">

                    <div class="col-md-6 mb-3">
                      <label class="form-label">Password</label>

                      <div class="input-group">
                        <input type="password"
                          class="form-control form-control-lg"
                          placeholder="Enter password">

                        <span class="input-group-text bg-white">
                          <i class="bi bi-lock"></i>
                        </span>
                      </div>
                    </div>

                    <div class="col-md-6 mb-4">
                      <label class="form-label">Confirm Password</label>

                      <div class="input-group">
                        <input type="password"
                          class="form-control form-control-lg"
                          placeholder="Confirm password">

                        <span class="input-group-text bg-white">
                          <i class="bi bi-lock-fill"></i>
                        </span>
                      </div>
                    </div>

                  </div>

                  <div class="form-check mb-4">

                    <input class="form-check-input"
                      type="checkbox"
                      id="terms">

                    <label class="form-check-label" for="terms">
                      I agree to the Terms & Conditions and Privacy Policy
                    </label>

                  </div>

                  <div class="d-grid mb-3">

                    <button type="submit"
                      class="btn btn-dark btn-lg">

                      Create Account

                    </button>

                  </div>

                  <div class="text-center">

                    <p class="mb-0">
                      Already have an account?

                      <a href="login.html"
                        class="text-decoration-none fw-semibold">

                        Login

                      </a>
                    </p>

                  </div>

                </form>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
