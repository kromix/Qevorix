<!DOCTYPE html>
<html lang="en">
      <!-- Favicons -->
  <link href="assets/img/favicon.png" rel="icon">
  <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Qevorix - Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

  <section class="min-vh-100 d-flex align-items-center py-5">

    <div class="container">

      <div class="row justify-content-center">

        <div class="col-lg-6">

          <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

            <div class="row g-0">

              <!-- Left Side -->
              <div class="col-md-5 bg-dark text-white p-4 d-flex flex-column justify-content-center">

                <h2 class="fw-bold mb-3">Qevorix</h2>

                <p class="mb-4">
                  Secure access to your regulatory compliance dashboard.
                </p>

                <div class="mb-2 d-flex align-items-center">
                  <i class="bi bi-shield-lock me-2"></i>
                  <small>Secure Login</small>
                </div>

                <div class="mb-2 d-flex align-items-center">
                  <i class="bi bi-speedometer2 me-2"></i>
                  <small>Track Applications</small>
                </div>

                <div class="d-flex align-items-center">
                  <i class="bi bi-file-earmark-check me-2"></i>
                  <small>Manage Compliance</small>
                </div>

              </div>

              <!-- Right Side -->
              <div class="col-md-7 bg-white p-4">

                <h3 class="fw-bold mb-1">Welcome Back</h3>

                <p class="text-muted mb-4">Login to your account</p>

                <form>

                  <div class="mb-3">
                    <label class="form-label">Email Address</label>

                    <div class="input-group">
                      <span class="input-group-text bg-white">
                        <i class="bi bi-envelope"></i>
                      </span>

                      <input type="email"
                        class="form-control form-control-lg"
                        placeholder="Enter your email">
                    </div>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Password</label>

                    <div class="input-group">
                      <span class="input-group-text bg-white">
                        <i class="bi bi-lock"></i>
                      </span>

                      <input type="password"
                        class="form-control form-control-lg"
                        placeholder="Enter your password">
                    </div>
                  </div>

                  <div class="d-flex justify-content-between align-items-center mb-4">

                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="remember">
                      <label class="form-check-label" for="remember">
                        Remember me
                      </label>
                    </div>

                    <a href="#" class="text-decoration-none small">
                      Forgot password?
                    </a>

                  </div>

                  <div class="d-grid mb-3">

                    <button type="submit" class="btn btn-dark btn-lg">
                      Login
                    </button>

                  </div>

                  <p class="text-center mb-0">
                    Don’t have an account?
                    <a href="register.html" class="text-decoration-none fw-semibold">
                      Create account
                    </a>
                  </p>

                </form>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </section>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
